[graph]
targets = [
    "x86_64-unknown-linux-gnu",
]
all-features = true
no-default-features = false

[advisories]
ignore = [
    "RUSTSEC-2025-0057",
    "RUSTSEC-2025-0111", # tokio-tar: PAX extended headers; pulled by testcontainers, no fix available
    "RUSTSEC-2025-0134", # rustls-pemfile: unmaintained; pulled by opentelemetry-otlp / tonic
    "RUSTSEC-2026-0173",
]

[licenses]
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-1-Clause",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CDLA-Permissive-2.0",
    "ISC",
    "LGPL-2.1-or-later",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
    "0BSD",
]
confidence-threshold = 0.8

[licenses.private]
ignore = true

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow-workspace = false

[sources]
unknown-registry = "warn"
unknown-git = "warn"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
