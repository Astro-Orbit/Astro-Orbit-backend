# ────────────────────────────────────────────────────────────
# Astro Orbit Backend — Production Docker Compose
# ────────────────────────────────────────────────────────────

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      cache_from:
        - astro-orbit-backend:cache
    ports:
      - "8080:8080"
      - "9090:9090"
    env_file:
      - .env
    environment:
      - APP_ENV=production
      - DATABASE_URL=postgres://astro_orbit:astro_orbit@db:5432/astro_orbit
      - REDIS_URL=redis://redis:6379
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/v1/ready"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 128M

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: astro_orbit
      POSTGRES_PASSWORD: astro_orbit
      POSTGRES_DB: astro_orbit
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U astro_orbit"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - redisdata:/data
    deploy:
      resources:
        limits:
          memory: 128M

volumes:
  pgdata:
  redisdata:
